<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Resume Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="card-title mb-3 text-center">Sample Digital Resume</h2>

        <form id="resumeForm">
          <div class="accordion" id="resumeAccordion">
            <div class="accordion-item">
              <h2 class="accordion-header" id="headingPersonal">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePersonal" aria-expanded="true" aria-controls="collapsePersonal">
                  Personal Info
                </button>
              </h2>
              <div id="collapsePersonal" class="accordion-collapse collapse show" aria-labelledby="headingPersonal" data-bs-parent="#resumeAccordion">
                <div class="accordion-body">
                  <div class="row g-3 mb-4">
                    <div class="col-md-3">
                      <label class="form-label">Profile Image</label>
                      <input type="file" class="form-control" id="profileImageInput" name="profileImage" accept="image/*" />
                      <img id="profileImagePreview" class="img-fluid mt-2 rounded" style="max-height: 150px; display: none;" alt="Profile preview" />
                    </div>
                    <div class="col-md-3">
                      <label class="form-label">First Name</label>
                      <input type="text" class="form-control" name="firstName" placeholder="First name" required />
                    </div>
                    <div class="col-md-3">
                      <label class="form-label">Last Name</label>
                      <input type="text" class="form-control" name="lastName" placeholder="Last name" required />
                    </div>
                    <div class="col-md-3">
                      <label class="form-label">Title</label>
                      <input type="text" class="form-control" name="title" placeholder="Full Stack Developer" />
                    </div>
                  </div>
                  <div class="row g-3 mb-4">
                    <div class="col-md-4">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control" name="email" placeholder="santanu.dutta@cognizant.com" required />
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">Phone</label>
                      <input type="tel" class="form-control" name="phone" placeholder="9051518663" />
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">Location</label>
                      <input type="text" class="form-control" name="location" placeholder="City, Country" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="accordion-item">
              <h2 class="accordion-header" id="headingSummary">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSummary" aria-expanded="false" aria-controls="collapseSummary">
                  Profile Summary
                </button>
              </h2>
              <div id="collapseSummary" class="accordion-collapse collapse" aria-labelledby="headingSummary" data-bs-parent="#resumeAccordion">
                <div class="accordion-body">
                  <textarea class="form-control" name="summary" rows="4" placeholder="Professional summary, 3-4 sentences..."></textarea>
                </div>
              </div>
            </div>

            <div class="accordion-item">
              <h2 class="accordion-header" id="headingExperience">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseExperience" aria-expanded="false" aria-controls="collapseExperience">
                  Work Experience
                </button>
              </h2>
              <div id="collapseExperience" class="accordion-collapse collapse" aria-labelledby="headingExperience" data-bs-parent="#resumeAccordion">
                <div class="accordion-body">
                  <div id="experienceList">
                    <div class="experience-entry border rounded p-3 mb-3">
                      <div class="mb-3">
                        <label class="form-label">Company</label>
                        <input class="form-control" name="company[]" placeholder="Company name" />
                      </div>
                      <div class="row g-3">
                        <div class="col-md-6">
                          <label class="form-label">Role</label>
                          <input class="form-control" name="role[]" placeholder="Senior Developer" />
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Duration</label>
                          <input class="form-control" name="duration[]" placeholder="2021 - Present" />
                        </div>
                      </div>
                      <div class="mt-3">
                        <label class="form-label">Key achievements</label>
                        <textarea class="form-control" name="achievements[]" rows="2" placeholder="Achievement bullets"></textarea>
                      </div>
                      <button type="button" class="btn btn-sm btn-outline-danger mt-3 removeExperienceBtn">Remove</button>
                    </div>
                  </div>
                  <button type="button" class="btn btn-outline-primary btn-sm" id="addExperienceBtn">Add More Experience</button>
                </div>
              </div>
            </div>

            <div class="accordion-item">
              <h2 class="accordion-header" id="headingEducation">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseEducation" aria-expanded="false" aria-controls="collapseEducation">
                  Education
                </button>
              </h2>
              <div id="collapseEducation" class="accordion-collapse collapse" aria-labelledby="headingEducation" data-bs-parent="#resumeAccordion">
                <div class="accordion-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">School / University</label>
                      <input class="form-control" name="school" placeholder="University name" />
                    </div>
                    <div class="col-md-3">
                      <label class="form-label">Degree</label>
                      <input class="form-control" name="degree" placeholder="BTech Computer Science" />
                    </div>
                    <div class="col-md-3">
                      <label class="form-label">Year</label>
                      <input class="form-control" name="gradYear" placeholder="2020" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="accordion-item">
              <h2 class="accordion-header" id="headingSkills">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSkills" aria-expanded="false" aria-controls="collapseSkills">
                  Skills & Links
                </button>
              </h2>
              <div id="collapseSkills" class="accordion-collapse collapse" aria-labelledby="headingSkills" data-bs-parent="#resumeAccordion">
                <div class="accordion-body">
                  <div class="mb-4">
                    <label class="form-label">Skills</label>
                    <input class="form-control" name="skills" placeholder="Separate with commas e.g. HTML, CSS, JS..." />
                  </div>
                  <div class="row g-3">
                    <div class="col-md-4">
                      <label class="form-label">LinkedIn</label>
                      <input class="form-control" name="linkedin" placeholder="https://..." />
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">GitHub</label>
                      <input class="form-control" name="github" placeholder="https://github.com/username" />
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">Portfolio</label>
                      <input class="form-control" name="portfolio" placeholder="https://your-site.com" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>

          <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary">Save Resume</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  </div> <!-- end container for resume builder -->

  <div class="container py-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="card-title mb-3 text-center">Contact For Support</h2>
        <p class="text-center text-muted mb-4">Have questions? Send a message and we’ll respond soon.</p>
        <form id="contactForm">
          <div class="mb-3">
            <label for="contactName" class="form-label">Name</label>
            <input type="text" id="contactName" name="contactName" class="form-control" placeholder="Your name" required>
          </div>
          <div class="mb-3">
            <label for="contactEmail" class="form-label">Email</label>
            <input type="email" id="contactEmail" name="contactEmail" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="mb-3">
            <label for="contactMessage" class="form-label">Message</label>
            <textarea id="contactMessage" name="contactMessage" class="form-control" rows="4" placeholder="Write your question or feedback" required></textarea>
          </div>
          <button type="submit" class="btn btn-success">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const experienceList = document.getElementById('experienceList');
    const addExperienceBtn = document.getElementById('addExperienceBtn');

    function createExperienceEntry() {
      const entry = document.createElement('div');
      entry.className = 'experience-entry border rounded p-3 mb-3';
      entry.innerHTML = `
        <div class="mb-3">
          <label class="form-label">Company</label>
          <input class="form-control" name="company[]" placeholder="Company name" />
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Role</label>
            <input class="form-control" name="role[]" placeholder="Senior Developer" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Duration</label>
            <input class="form-control" name="duration[]" placeholder="2021 - Present" />
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label">Key achievements</label>
          <textarea class="form-control" name="achievements[]" rows="2" placeholder="Achievement bullets"></textarea>
        </div>
        <button type="button" class="btn btn-sm btn-outline-danger mt-3 removeExperienceBtn">Remove</button>
      `;
      return entry;
    }

    function updateRemoveButtons() {
      const removeButtons = experienceList.querySelectorAll('.removeExperienceBtn');
      removeButtons.forEach((btn) => {
        btn.onclick = () => {
          const entry = btn.closest('.experience-entry');
          if (entry) entry.remove();
        };
      });
    }

    addExperienceBtn.addEventListener('click', () => {
      const newEntry = createExperienceEntry();
      experienceList.appendChild(newEntry);
      updateRemoveButtons();
    });

    updateRemoveButtons();

    document.getElementById('profileImageInput').addEventListener('change', function (e) {
      const [file] = this.files;
      const preview = document.getElementById('profileImagePreview');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.src = '';
        preview.style.display = 'none';
      }
    });

    document.getElementById('contactForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Contact message submitted!');
      e.target.reset();
    });
  </script>
</body>
</html>
