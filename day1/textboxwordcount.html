<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Speed Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light p-4">
  <div class="container">
    <div class="mb-3">
      <div><strong>Clock:</strong> <span id="clock">--:--:--</span></div>
      <div><strong>Timer:</strong> <strong id="timer">0.00</strong> sec</div>
    </div>

    <h1 class="mb-4">Typing Speed</h1>

    <div class="mb-3">
      <textarea id="typingArea" class="form-control" rows="8" placeholder="Type here..."></textarea>
    </div>

    <div class="btn-group mb-3" role="group">
      <button id="resetBtn" class="btn btn-secondary" disabled>Reset</button>
    </div>

    <div class="card p-3 mt-2">
      <p>Word Typed per second: <strong id="wpm">0.00</strong></p>
      <p>Characters Typed per second: <strong id="cpm">0.00</strong></p>
      <p>Sentences Typed per Minute: <strong id="spm">0.00</strong></p>
    </div>
  </div>

  <script>
    const textarea = document.getElementById('typingArea');
    // const startBtn = document.getElementById('startBtn');
    // const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    // const elapsedEl = document.getElementById('elapsed');
    // const wordsEl = document.getElementById('words');
    const wpmEl = document.getElementById('wpm');
    const cpmEl = document.getElementById('cpm');
    const spmEl = document.getElementById('spm');


    let startTime = null;
    let timerInterval = null;

    function wordCount(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function charCount(text) {
      return text.length;
    }

    function sentenceCount(text) {
      return text.split(/[.!?]+/).filter(Boolean).length;
    }

    const clockEl = document.getElementById('clock');
    const timerEl = document.getElementById('timer');

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    function updateStats() {
      const durationSec = (Date.now() - startTime) / 1000;
      const words = wordCount(textarea.value);
      const chars = charCount(textarea.value);
      const sentences = sentenceCount(textarea.value);

      const wpm = durationSec > 0 ? (words / durationSec) : 0;
      const cpm = durationSec > 0 ? (chars / durationSec) : 0;
      const spm = durationSec > 0 ? (sentences / durationSec) * 60 : 0;

      timerEl.textContent = durationSec.toFixed(2);
      // elapsedEl.textContent = durationSec.toFixed(2);
      // wordsEl.textContent = words;
      wpmEl.textContent = wpm.toFixed(2);
      cpmEl.textContent = cpm.toFixed(2);
      spmEl.textContent = spm.toFixed(2);
    }

    textarea.addEventListener('focus', () => {
      startTime = Date.now();
      textarea.disabled = false;
      // startBtn.disabled = true;
      // stopBtn.disabled = false;
      resetBtn.disabled = false;
      timerInterval = setInterval(updateStats, 200);
    });

    // startBtn.addEventListener('click', () => {
    //   startTime = Date.now();
    //   textarea.disabled = false;
    //   textarea.focus();
    //   // startBtn.disabled = true;
    //   // stopBtn.disabled = false;
    //   resetBtn.disabled = false;
    //   timerInterval = setInterval(updateStats, 200);
    // });

    // stopBtn.addEventListener('click', () => {
    //   clearInterval(timerInterval);
    //   timerInterval = null;
    //   updateStats();
    //   textarea.disabled = true;
    //   // startBtn.disabled = false;
    //   // stopBtn.disabled = true;
    // });

    textarea.addEventListener('blur', () => {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        updateStats();
        // startBtn.disabled = false;
        // stopBtn.disabled = true;
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      timerInterval = null;
      startTime = null;
      textarea.value = '';
      textarea.disabled = true;
      // elapsedEl.textContent = '0.00';
      timerEl.textContent = '0.00';
      // wordsEl.textContent = '0';
      wpmEl.textContent = '0.00';
      cpmEl.textContent = '0.00';
      spmEl.textContent = '0.00';
      // startBtn.disabled = false;
      // stopBtn.disabled = true;
      resetBtn.disabled = true;
    });
  </script>
</body>
</html>
